name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  build:
    name: Build exe
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install PySide6-Multimedia || echo "PySide6-Multimedia not available, video preview disabled"

      - name: Build with PyInstaller
        run: python scripts/build.py --no-open

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WallpaperManager
          path: dist/WallpaperManager/
          retention-days: 30

      - name: Package exe for release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path dist/WallpaperManager/* -DestinationPath dist/WallpaperManager.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WallpaperManager.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
